esphome:
  name: eink-dashboard
  friendly_name: Dashboard

# Board support for Waveshare ESP32-S3-Touch-LCD-7
# https://github.com/inytar/waveshare-esp32-s3-touch-lcd-7-esphome
packages:
  waveshare_7:
    url: https://github.com/inytar/waveshare-esp32-s3-touch-lcd-7-esphome
    ref: main
    file: waveshare-esp32-s3-touch-lcd-7.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Dashboard Fallback"
    password: !secret wifi_fallback_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# 8MB PSRAM required for 800x480 image buffer (~1.5MB decoded)
psram:
  mode: octal
  speed: 80MHz

online_image:
  - url: http://192.168.x.x:8123/local/dashboard.png  # replace with your HA IP
    id: dashboard_img
    format: PNG
    update_interval: 600s
    on_download_finished:
      - component.update: my_display

display:
  - platform: rpi_dpi_rgb
    id: my_display
    lambda: |-
      it.image(0, 0, id(dashboard_img));
