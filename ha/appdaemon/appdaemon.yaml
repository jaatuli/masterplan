# This file is a reference template — the actual file managed by the HA add-on
# lives at /addon_configs/a0d7b954_appdaemon/appdaemon.yaml (host path) or
# /config/appdaemon.yaml inside the AppDaemon container.
#
# The HA add-on auto-injects the HASS plugin connection via SUPERVISOR_TOKEN,
# so ha_url and token are not needed here.
#
# Python packages are added via the add-on UI (Settings → Add-ons → AppDaemon
# → Configuration → python_packages), NOT in this file. Required packages:
#   Pillow, requests, pycaruna, icalendar, recurring_ical_events, aiohttp

appdaemon:
  latitude: 60.xx       # replace with your coordinates
  longitude: 24.xx
  elevation: 30
  time_zone: Europe/Helsinki
  plugins:
    HASS:
      type: hass
      token: !env_var SUPERVISOR_TOKEN

http:
  url: http://0.0.0.0:5050

admin:
api:
hadashboard:
